# Render Blueprint — Deploy TasteCam Heritage
# https://render.com/docs/blueprint-spec

services:
  # Backend API
  - type: web
    name: tastecam-backend
    env: node
    region: frankfurt
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        value: postgresql://tastecam:tastecam@localhost:5432/tastecam
    healthCheckPath: /api/health
    autoDeploy: true

  # Frontend (static site)
  - type: web
    name: tastecam-frontend
    env: static
    region: frankfurt
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://tastecam-backend.onrender.com/api
    autoDeploy: true
