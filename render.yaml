# Render Blueprint — Deploy TasteCam Heritage
# https://render.com/docs/blueprint-spec
#
# Single web service: Express API + built frontend static files.
# 1. Build: install backend deps + build frontend
# 2. Start: Node.js serves Express API + serves frontend from dist/
# Uses SERVE_STATIC=true flag in server.js

services:
  - type: web
    name: tastecam-heritage
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: cd backend && npm install && cd ../frontend && npm install && npm run build
    startCommand: node backend/src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: SERVE_STATIC
        value: "true"
    healthCheckPath: /api/health
    autoDeploy: true
    domains:
      - tastecam-heritage.onrender.com
