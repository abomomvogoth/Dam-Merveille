apiVersion: apps/v1
kind: Deployment
metadata:
  name: tastecam-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tastecam-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: tastecam-backend
    spec:
      containers:
        - name: backend
          image: tastecam-backend:latest
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              value: "4000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tastecam-secrets
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 20

