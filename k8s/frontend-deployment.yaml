apiVersion: apps/v1
kind: Deployment
metadata:
  name: tastecam-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tastecam-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: tastecam-frontend
    spec:
      containers:
        - name: frontend
          image: tastecam-frontend:latest
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20

