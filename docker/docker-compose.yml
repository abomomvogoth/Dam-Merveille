version: '3.9'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: tastecam
      POSTGRES_PASSWORD: tastecam
      POSTGRES_DB: tastecam
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tastecam"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ../backend
    working_dir: /app
    volumes:
      - ../backend:/app
    environment:
      - PORT=4000
      - DATABASE_URL=postgresql://tastecam:tastecam@db:5432/tastecam
      - NODE_ENV=development
    ports:
      - '4000:4000'
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ../frontend
    working_dir: /app
    volumes:
      - ../frontend:/app
    ports:
      - '3000:3000'
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - '9090:9090'
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - grafana_data:/var/lib/grafana
    ports:
      - '3001:3000'
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=tastecam
    depends_on:
      - prometheus

volumes:
  db_data:
  prometheus_data:
  grafana_data:
