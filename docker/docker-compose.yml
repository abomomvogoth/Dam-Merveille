version: '3.9'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: tastecam
      POSTGRES_PASSWORD: tastecam
      POSTGRES_DB: tastecam
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build: ../backend
    working_dir: /app
    volumes:
      - ../backend:/app
    environment:
      - PORT=4000
      - DATABASE_URL=postgresql://tastecam:tastecam@db:5432/tastecam
    ports:
      - '4000:4000'
    depends_on:
      - db

  frontend:
    build: ../frontend
    working_dir: /app
    volumes:
      - ../frontend:/app
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  db_data:
