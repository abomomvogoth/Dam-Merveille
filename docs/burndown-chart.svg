<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <style>
      .grid { stroke: #e8d5c0; stroke-width: 1; }
      .line-ideal { stroke: #d4532a; stroke-width: 3; stroke-dasharray: 8 4; }
      .line-actual { stroke: #4a7c3f; stroke-width: 3; stroke-linejoin: round; }
      .line-actual-area { fill: rgba(74,124,63,0.08); }
      .label { font-size: 12px; fill: #5c3d2e; }
      .label-bold { font-size: 13px; font-weight: 700; fill: #2d1f0e; }
      .title { font-size: 20px; font-weight: 800; fill: #2d1f0e; }
      .dot-actual { fill: #4a7c3f; stroke: #fff; stroke-width: 2; }
      .marker-text { font-size: 10px; fill: #6b5a4a; }
      .sprint-bg { fill: rgba(212,83,42,0.06); }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#fdf8f0" rx="12"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" class="title">TasteCam Heritage — Sprint Burndown Chart</text>
  <text x="400" y="55" text-anchor="middle" class="label">Sprint 1 & 2: MVP to Full Feature Delivery (10 Days)</text>

  <!-- Chart Area -->
  <rect x="100" y="70" width="620" height="360" fill="#fff" stroke="#e8d5c0" stroke-width="2" rx="6"/>
  
  <!-- Grid lines (horizontal) -->
  <line x1="100" y1="70" x2="100" y2="430" class="grid"/>
  <line x1="100" y1="160" x2="720" y2="160" class="grid"/>
  <line x1="100" y1="250" x2="720" y2="250" class="grid"/>
  <line x1="100" y1="340" x2="720" y2="340" class="grid"/>
  <line x1="100" y1="430" x2="720" y2="430" class="grid"/>

  <!-- Grid lines (vertical) -->
  <line x1="100" y1="70" x2="100" y2="430" class="grid"/>
  <line x1="206" y1="70" x2="206" y2="430" class="grid"/>
  <line x1="312" y1="70" x2="312" y2="430" class="grid"/>
  <line x1="418" y1="70" x2="418" y2="430" class="grid"/>
  <line x1="524" y1="70" x2="524" y2="430" class="grid"/>
  <line x1="630" y1="70" x2="630" y2="430" class="grid"/>
  <line x1="720" y1="70" x2="720" y2="430" class="grid"/>

  <!-- Y-axis labels -->
  <text x="85" y="435" text-anchor="end" class="label">0</text>
  <text x="85" y="345" text-anchor="end" class="label">5</text>
  <text x="85" y="255" text-anchor="end" class="label">10</text>
  <text x="85" y="165" text-anchor="end" class="label">15</text>
  <text x="85" y="78" text-anchor="end" class="label">25</text>
  
  <text x="60" y="260" text-anchor="middle" transform="rotate(-90, 60, 260)" class="label-bold">Story Points</text>

  <!-- X-axis labels -->
  <text x="100" y="455" text-anchor="middle" class="label">Day 0</text>
  <text x="160" y="455" text-anchor="middle" class="label">Day 1</text>
  <text x="220" y="455" text-anchor="middle" class="label">Day 2</text>
  <text x="280" y="455" text-anchor="middle" class="label">Day 3</text>
  <text x="340" y="455" text-anchor="middle" class="label">Day 4</text>
  <text x="400" y="455" text-anchor="middle" class="label">Day 5</text>
  <text x="460" y="455" text-anchor="middle" class="label">Day 6</text>
  <text x="520" y="455" text-anchor="middle" class="label">Day 7</text>
  <text x="580" y="455" text-anchor="middle" class="label">Day 8</text>
  <text x="640" y="455" text-anchor="middle" class="label">Day 9</text>
  <text x="700" y="455" text-anchor="middle" class="label">Day 10</text>
  
  <text x="400" y="480" text-anchor="middle" class="label-bold">Sprint Days</text>

  <!-- Sprint 1 background (Days 0-5) -->
  <rect x="100" y="70" width="312" height="360" class="sprint-bg"/>
  <text x="256" y="90" text-anchor="middle" class="label-bold" fill="#d4532a">Sprint 1: MVP (25h)</text>

  <!-- Sprint 2 background (Days 5-10) -->
  <rect x="412" y="70" width="308" height="360" fill="rgba(74,124,63,0.06)"/>
  <text x="566" y="90" text-anchor="middle" class="label-bold" fill="#4a7c3f">Sprint 2: Features (20h)</text>

  <!-- Separator -->
  <line x1="412" y1="70" x2="412" y2="430" stroke="#d4532a" stroke-width="2" stroke-dasharray="4 4"/>

  <!-- IDEAL LINE (straight from (100, 70) to (720, 430)):  25→0 over 10 days -->
  <polyline class="line-ideal" points="100,70 720,430"/>

  <!-- ACTUAL LINE (realistic burndown) -->
  <!-- Day 0: 25, Day 1: 23, Day 2: 20, Day 3: 16, Day 4: 11, Day 5: 6, Day 6: 4, Day 7: 2, Day 8: 1, Day 9: 0, Day 10: 0 -->
  <polyline class="line-actual" points="100,70 162,79 224,97 286,124 348,160 410,205 472,232 534,259 596,277 658,304 720,340"/>

  <!-- ACTUAL AREA (below the line) -->
  <path class="line-actual-area" d="M100,430 L100,70 L162,79 L224,97 L286,124 L348,160 L410,205 L472,232 L534,259 L596,277 L658,304 L720,340 L720,430 Z"/>

  <!-- Actual points -->
  <circle cx="100" cy="70" r="6" class="dot-actual"/>
  <circle cx="162" cy="79" r="6" class="dot-actual"/>
  <circle cx="224" cy="97" r="6" class="dot-actual"/>
  <circle cx="286" cy="124" r="6" class="dot-actual"/>
  <circle cx="348" cy="160" r="6" class="dot-actual"/>
  <circle cx="410" cy="205" r="6" class="dot-actual"/>
  <circle cx="472" cy="232" r="6" class="dot-actual"/>
  <circle cx="534" cy="259" r="6" class="dot-actual"/>
  <circle cx="596" cy="277" r="6" class="dot-actual"/>
  <circle cx="658" cy="304" r="6" class="dot-actual"/>
  <circle cx="720" cy="340" r="6" class="dot-actual"/>

  <!-- Sprint milestones -->
  <text x="110" y="65" class="marker-text">25 SP</text>
  <text x="720" y="445" class="marker-text">0 SP</text>

  <!-- Key milestone markers -->
  <rect x="348" y="210" width="80" height="18" fill="#d4532a" rx="6" ry="6"/>
  <text x="388" y="223" text-anchor="middle" class="text-white" font-size="9" font-weight="700">Sprint 1 ✓</text>

  <!-- Legend -->
  <rect x="150" y="85" width="14" height="3" class="line-ideal"/>
  <text x="170" y="89" class="marker-text">Ideal burndown</text>

  <rect x="300" y="85" width="14" height="3" class="line-actual"/>
  <text x="320" y="89" class="marker-text">Actual progress</text>

  <!-- Annotation: Scope -->
  <text x="600" y="260" class="marker-text" font-size="9">Product Backlog: 10 items</text>
  <text x="600" y="275" class="marker-text" font-size="9">Completed: 10/10</text>
</svg>