<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fdf8f0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f8e8d0;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="be-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="fe-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="db-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="monitor-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4532a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#b8431e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cicd-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:0.85"/>
    </linearGradient>
    <style>
      .box { fill: #fff; stroke: #2d1f0e; stroke-width: 2.5; rx: 12; ry: 12; }
      .box-sm { fill: #fff; stroke: #2d1f0e; stroke-width: 2; rx: 8; ry: 8; }
      .box-developer { fill: #fef0e5; stroke: #d4532a; stroke-width: 2; rx: 10; ry: 10; }
      .text-title { font-size: 22px; font-weight: 800; fill: #2d1f0e; }
      .text-subtitle { font-size: 13px; fill: #5c3d2e; }
      .text-label { font-size: 13px; font-weight: 700; fill: #2d1f0e; }
      .text-small { font-size: 10px; fill: #6b5a4a; }
      .text-white { fill: #fff; font-weight: 700; }
      .arrow { stroke: #5c3d2e; stroke-width: 2; fill: none; }
      .arrow-dashed { stroke: #8b7a6a; stroke-width: 2; fill: none; stroke-dasharray: 6 4; }
      .badge { fill: #e8f5e0; stroke: #4a7c3f; stroke-width: 1; rx: 4; ry: 4; }
      .badge-text { font-size: 9px; font-weight: 700; fill: #4a7c3f; }
      .icon { font-size: 24px; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" class="text-title">TasteCam Heritage — Architecture Diagram</text>
  <text x="600" y="62" text-anchor="middle" class="text-subtitle">SEN3244 Software Architecture — Spring 2026</text>

  <!-- ==================== LAYER 1: USERS ==================== -->
  <text x="60" y="95" class="text-label">LAYER 1 : USERS</text>
  <line x1="60" y1="100" x2="1140" y2="100" stroke="#e8d5c0" stroke-width="1"/>

  <!-- User Icon -->
  <rect x="30" y="108" width="100" height="70" class="box-developer"/>
  <text x="80" y="140" text-anchor="middle" class="text-label">🌐</text>
  <text x="80" y="160" text-anchor="middle" class="text-small">End Users</text>

  <!-- HTTPS Arrow -->
  <line x1="130" y1="145" x2="180" y2="145" class="arrow"/>
  <polygon points="180,140 190,145 180,150" fill="#5c3d2e"/>

  <!-- ==================== LAYER 2: LOAD BALANCER ==================== -->
  <text x="60" y="210" class="text-label">LAYER 2 : LOAD BALANCER & INGRESS</text>
  <line x1="60" y1="215" x2="1140" y2="215" stroke="#e8d5c0" stroke-width="1"/>

  <!-- NGINX / Ingress Controller -->
  <rect x="180" y="220" width="200" height="70" class="box"/>
  <rect x="180" y="220" width="200" height="26" fill="#c67b4b" rx="8" ry="8"/>
  <text x="280" y="238" text-anchor="middle" class="text-white" font-size="12">NGINX Ingress Controller</text>
  <text x="280" y="260" text-anchor="middle" class="text-small">Load Balancer / Reverse Proxy</text>
  <text x="280" y="275" text-anchor="middle" class="text-small">SSL Termination</text>

  <!-- Arrows to Frontend & Backend -->
  <line x1="280" y1="290" x2="280" y2="330" class="arrow"/>
  <polygon points="275,330 280,340 285,330" fill="#5c3d2e"/>

  <line x1="490" y1="290" x2="490" y2="330" class="arrow"/>
  <polygon points="485,330 490,340 495,330" fill="#5c3d2e"/>

  <!-- ==================== LAYER 3: FRONTEND & BACKEND ==================== -->
  <text x="60" y="355" class="text-label">LAYER 3 : APPLICATION (Kubernetes Cluster)</text>
  <line x1="60" y1="360" x2="1140" y2="360" stroke="#e8d5c0" stroke-width="1"/>

  <!-- Kubernetes Cluster Box -->
  <rect x="150" y="365" width="600" height="200" fill="none" stroke="#5c3d2e" stroke-width="2" rx="16" stroke-dasharray="8 4"/>
  <rect x="160" y="370" width="120" height="20" fill="#fdf8f0"/>
  <text x="220" y="385" text-anchor="middle" class="text-small" font-weight="700">Kubernetes Cluster</text>

  <!-- Frontend Pods -->
  <rect x="175" y="395" width="180" height="70" fill="url(#fe-gradient)" rx="10" ry="10"/>
  <text x="265" y="420" text-anchor="middle" class="text-white" font-size="13">Frontend (React)</text>
  <text x="265" y="438" text-anchor="middle" class="text-white" font-size="10" opacity="0.85">2–8 Replicas (HPA)</text>
  <text x="265" y="453" text-anchor="middle" class="text-white" font-size="10" opacity="0.85">Port 3000</text>

  <!-- Backend Pods -->
  <rect x="420" y="395" width="180" height="70" fill="url(#be-gradient)" rx="10" ry="10"/>
  <text x="510" y="420" text-anchor="middle" class="text-white" font-size="13">Backend (Express)</text>
  <text x="510" y="438" text-anchor="middle" class="text-white" font-size="10" opacity="0.85">2–10 Replicas (HPA)</text>
  <text x="510" y="453" text-anchor="middle" class="text-white" font-size="10" opacity="0.85">Port 4000</text>

  <!-- RollingUpdate badges -->
  <rect x="175" y="472" width="180" height="16" class="badge"/>
  <text x="265" y="484" text-anchor="middle" class="badge-text">RollingUpdate — maxUnavailable=0</text>

  <rect x="420" y="472" width="180" height="16" class="badge"/>
  <text x="510" y="484" text-anchor="middle" class="badge-text">Health Probes / Readiness + Liveness</text>

  <!-- Replica icons -->
  <circle cx="230" cy="500" r="4" fill="#10b981" opacity="0.5"/>
  <circle cx="250" cy="500" r="4" fill="#10b981" opacity="0.5"/>
  <circle cx="270" cy="500" r="4" fill="#10b981" opacity="0.5"/>

  <circle cx="475" cy="500" r="4" fill="#3b82f6" opacity="0.5"/>
  <circle cx="495" cy="500" r="4" fill="#3b82f6" opacity="0.5"/>
  <circle cx="515" cy="500" r="4" fill="#3b82f6" opacity="0.5"/>

  <!-- Frontend ↔ Backend arrow -->
  <line x1="355" y1="430" x2="420" y2="430" class="arrow"/>
  <polygon points="415,425 425,430 415,435" fill="#5c3d2e"/>
  <text x="387" y="420" text-anchor="middle" class="text-small">API / REST</text>

  <!-- Services -->
  <rect x="175" y="520" width="80" height="20" fill="#e8d5c0" rx="6" ry="6"/>
  <text x="215" y="534" text-anchor="middle" class="text-small" font-weight="600">Service</text>
  <rect x="420" y="520" width="80" height="20" fill="#e8d5c0" rx="6" ry="6"/>
  <text x="460" y="534" text-anchor="middle" class="text-small" font-weight="600">Service</text>

  <!-- ==================== LAYER 4: DATABASE ==================== -->
  <text x="60" y="595" class="text-label">LAYER 4 : DATA LAYER</text>
  <line x1="60" y1="600" x2="1140" y2="600" stroke="#e8d5c0" stroke-width="1"/>

  <!-- PostgreSQL -->
  <rect x="420" y="610" width="180" height="70" fill="url(#db-gradient)" rx="10" ry="10"/>
  <text x="510" y="636" text-anchor="middle" class="text-white" font-size="13">PostgreSQL 15</text>
  <text x="510" y="654" text-anchor="middle" class="text-white" font-size="10" opacity="0.85">StatefulSet — 1 Replica</text>
  <text x="510" y="669" text-anchor="middle" class="text-white" font-size="10" opacity="0.85">Port 5432</text>

  <!-- Backend → DB arrow -->
  <line x1="510" y1="535" x2="510" y2="610" class="arrow"/>
  <polygon points="505,610 510,620 515,610" fill="#5c3d2e"/>
  <text x="540" y="575" class="text-small">JDBC</text>

  <!-- ==================== RIGHT SIDE: MONITORING ==================== -->
  <text x="820" y="100" class="text-label">MONITORING STACK</text>
  <line x1="820" y1="105" x2="1140" y2="105" stroke="#e8d5c0" stroke-width="1"/>

  <!-- Prometheus -->
  <rect x="820" y="115" width="140" height="65" fill="url(#monitor-gradient)" rx="10" ry="10"/>
  <text x="890" y="140" text-anchor="middle" class="text-white" font-size="12">Prometheus</text>
  <text x="890" y="158" text-anchor="middle" class="text-white" font-size="10" opacity="0.85">Scrape Interval: 15s</text>
  <text x="890" y="172" text-anchor="middle" class="text-white" font-size="10" opacity="0.85">Port 9090</text>

  <!-- Grafana -->
  <rect x="990" y="115" width="140" height="65" fill="url(#monitor-gradient)" rx="10" ry="10"/>
  <text x="1060" y="140" text-anchor="middle" class="text-white" font-size="12">Grafana</text>
  <text x="1060" y="158" text-anchor="middle" class="text-white" font-size="10" opacity="0.85">Dashboards</text>
  <text x="1060" y="172" text-anchor="middle" class="text-white" font-size="10" opacity="0.85">Port 3001</text>

  <!-- Prometheus → Grafana arrow -->
  <line x1="960" y1="150" x2="990" y2="150" class="arrow"/>
  <polygon points="985,145 995,150 985,155" fill="#5c3d2e"/>

  <!-- Metrics from Backend to Prometheus (dashed) -->
  <line x1="600" y1="430" x2="820" y2="140" class="arrow-dashed"/>
  <text x="670" y="280" transform="rotate(-50, 670, 280)" class="text-small">/api/metrics</text>

  <!-- ==================== RIGHT SIDE: CI/CD ==================== -->
  <text x="820" y="230" class="text-label">CI/CD PIPELINE</text>
  <line x1="820" y1="235" x2="1140" y2="235" stroke="#e8d5c0" stroke-width="1"/>

  <!-- GitHub -->
  <rect x="820" y="245" width="140" height="50" fill="url(#cicd-gradient)" rx="8" ry="8"/>
  <text x="890" y="268" text-anchor="middle" class="text-white" font-size="12">GitHub</text>
  <text x="890" y="283" text-anchor="middle" class="text-white" font-size="10" opacity="0.85">Source Control</text>

  <!-- Jenkins -->
  <rect x="820" y="310" width="140" height="65" fill="#0f172a" rx="8" ry="8"/>
  <text x="890" y="335" text-anchor="middle" class="text-white" font-size="12">Jenkins CI/CD</text>
  <text x="890" y="352" text-anchor="middle" class="text-white" font-size="10" opacity="0.85">Build → Test → Deploy</text>
  <text x="890" y="366" text-anchor="middle" class="text-white" font-size="10" opacity="0.85">Slack Notifications</text>

  <!-- GitHub → Jenkins -->
  <line x1="890" y1="295" x2="890" y2="310" class="arrow"/>
  <polygon points="885,310 890,320 895,310" fill="#5c3d2e"/>

  <!-- Jenkins → K8s -->
  <line x1="820" y1="345" x2="750" y2="430" class="arrow-dashed"/>
  <text x="760" y="390" class="text-small">kubectl apply</text>

  <!-- Docker Hub -->
  <rect x="990" y="245" width="140" height="50" fill="url(#cicd-gradient)" rx="8" ry="8"/>
  <text x="1060" y="268" text-anchor="middle" class="text-white" font-size="12">Docker Hub</text>
  <text x="1060" y="283" text-anchor="middle" class="text-white" font-size="10" opacity="0.85">Image Registry</text>

  <line x1="960" y1="270" x2="990" y2="270" class="arrow"/>
  <polygon points="985,265 995,270 985,275" fill="#5c3d2e"/>

  <!-- ==================== BOTTOM RIGHT: IaC ==================== -->
  <text x="820" y="420" class="text-label">INFRASTRUCTURE AS CODE</text>
  <line x1="820" y1="425" x2="1140" y2="425" stroke="#e8d5c0" stroke-width="1"/>

  <!-- Ansible -->
  <rect x="820" y="435" width="140" height="50" fill="#7c3aed" rx="8" ry="8"/>
  <text x="890" y="458" text-anchor="middle" class="text-white" font-size="12">Ansible</text>
  <text x="890" y="473" text-anchor="middle" class="text-white" font-size="10" opacity="0.85">2 Playbooks</text>

  <!-- Terraform -->
  <rect x="990" y="435" width="140" height="50" fill="#7c3aed" rx="8" ry="8"/>
  <text x="1060" y="458" text-anchor="middle" class="text-white" font-size="12">Bash Script</text>
  <text x="1060" y="473" text-anchor="middle" class="text-white" font-size="10" opacity="0.85">Provisioning</text>

  <!-- ==================== BOTTOM: K8s + Testing ==================== -->
  <text x="60" y="715" class="text-label">ORCHESTRATION & QUALITY</text>
  <line x1="60" y1="720" x2="750" y2="720" stroke="#e8d5c0" stroke-width="1"/>

  <!-- HPA -->
  <rect x="60" y="730" width="150" height="55" class="box-sm"/>
  <text x="135" y="755" text-anchor="middle" class="text-label">Horizontal Pod Autoscaler</text>
  <text x="135" y="773" text-anchor="middle" class="text-small">CPU >70% → scale up</text>

  <!-- Ingress -->
  <rect x="240" y="730" width="150" height="55" class="box-sm"/>
  <text x="315" y="755" text-anchor="middle" class="text-label">Ingress Controller</text>
  <text x="315" y="773" text-anchor="middle" class="text-small">Path-based routing</text>

  <!-- Testing -->
  <rect x="420" y="730" width="150" height="55" class="box-sm"/>
  <text x="495" y="753" text-anchor="middle" class="text-label">Test Suite</text>
  <text x="495" y="770" text-anchor="middle" class="text-small">Jest + Supertest</text>
  <text x="495" y="783" text-anchor="middle" class="text-small">Coverage: 92%+</text>

  <!-- Docker -->
  <rect x="600" y="730" width="140" height="55" class="box-sm"/>
  <text x="670" y="753" text-anchor="middle" class="text-label">Docker</text>
  <text x="670" y="770" text-anchor="middle" class="text-small">5 Services</text>
  <text x="670" y="783" text-anchor="middle" class="text-small">docker-compose</text>

  <!-- ==================== LEGEND ==================== -->
  <rect x="60" y="810" width="660" height="75" fill="#fff" stroke="#e8d5c0" stroke-width="2" rx="10" ry="10"/>
  <text x="80" y="835" class="text-label">LEGEND</text>

  <rect x="80" y="845" width="14" height="14" fill="url(#fe-gradient)" rx="3" ry="3"/>
  <text x="100" y="857" class="text-small">Frontend</text>

  <rect x="200" y="845" width="14" height="14" fill="url(#be-gradient)" rx="3" ry="3"/>
  <text x="220" y="857" class="text-small">Backend</text>

  <rect x="320" y="845" width="14" height="14" fill="url(#db-gradient)" rx="3" ry="3"/>
  <text x="340" y="857" class="text-small">Database</text>

  <rect x="440" y="845" width="14" height="14" fill="url(#monitor-gradient)" rx="3" ry="3"/>
  <text x="460" y="857" class="text-small">Monitoring</text>

  <line x1="560" y1="852" x2="610" y2="852" class="arrow"/>
  <text x="618" y="857" class="text-small">Data Flow</text>

  <line x1="80" y1="870" x2="130" y2="870" class="arrow-dashed"/>
  <text x="138" y="875" class="text-small">Metrics</text>

  <!-- Version -->
  <text x="1140" y="895" text-anchor="end" class="text-small">v2.0 — TasteCam Heritage Architecture</text>
</svg>